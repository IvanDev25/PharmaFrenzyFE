<div class="header" *ngIf="!hideNavbar">
  <div class="quick-links" *ngIf="(accountService.user$ | async) as user">
    <button mat-button class="quick-link" (click)="goToExams()" *ngIf="hasRole(user.role, 'Student')">Exams</button>
    <button mat-button class="quick-link" (click)="goToRanking()" *ngIf="hasRole(user.role, 'Student')">Ranking</button>
    <button mat-button class="quick-link" (click)="goToHistory()" *ngIf="hasRole(user.role, 'Student')">History</button>
  </div>

  <div class="header-profile-zone" *ngIf="(accountService.user$ | async) as user">
    <button class="wallet-pill" type="button" *ngIf="hasRole(user.role, 'Student')" (click)="goToWallet()">
      <img class="wallet-pill__icon" src="assets/RxWallet.png" alt="RxWallet" />
      <div class="wallet-pill__copy">
        <span class="wallet-pill__label">RxWallet</span>
        <strong><img class="wallet-pill__coin" src="assets/RxCoin.png" alt="RxCoin" />{{ user.rxCoinBalance | number: '1.1-2' }}</strong>
      </div>
    </button>

    <div class="user-profile" (click)="toggleDropdown('user')" [class.active]="activeDropdown === 'user'">
      <div class="avatar">
        <img *ngIf="user.image; else initialsAvatar" [src]="user.image" [alt]="user.firstName + ' avatar'" />
        <ng-template #initialsAvatar>{{ getInitials(user.firstName, user.lastName) }}</ng-template>
      </div>
      <div class="user-info">
        <div class="user-name-row">
          <img
            *ngIf="hasRole(user.role, 'Student')"
            class="level-icon"
            [src]="levelBadge(user.level)"
            [alt]="'Level ' + user.level + ' badge'" />
          <div class="user-name">{{ user.firstName | titlecase }} {{ user.lastName | titlecase }}</div>
          <span class="level-badge" *ngIf="hasRole(user.role, 'Student')">Lv. {{ user.level }}</span>
        </div>
        <div class="user-role">{{ user.role || 'User' }}</div>
        <div class="exp-progress" *ngIf="hasRole(user.role, 'Student')">
          <div class="exp-progress__meta">
            <span>EXP</span>
            <span>{{ user.experiencePoints | number: '1.0-2' }}/{{ totalExperienceForNextLevel(user) | number: '1.0-2' }}</span>
          </div>
          <div class="exp-progress__track">
            <div class="exp-progress__fill" [style.width.%]="experienceProgressPercent(user)"></div>
          </div>
        </div>
      </div>
      <div class="dropdown-arrow"></div>

      <div class="dropdown" [class.active]="activeDropdown === 'user'">
        <div class="dropdown-item" (click)="goToProfile()">
          <span class="dropdown-icon">P</span>
          <span class="dropdown-text">Profile</span>
        </div>
        <div class="dropdown-item" (click)="logout()">
          <span class="dropdown-icon">L</span>
          <span class="dropdown-text">Logout</span>
        </div>
      </div>
    </div>
  </div>
</div>
